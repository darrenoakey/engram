<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>engram</title>
<link rel="stylesheet" href="{{ static:chat.css }}">
</head>
<body>
<div id="app">
  <header>
    <span class="dot"></span>
    <h1>engram</h1>
    <span class="pill" id="pill" title="what has it actually learned?">…</span>
  </header>
  <div id="mem">
    <h3 id="memhead">Memory</h3>
    <div class="sub" id="memsub"></div>
    <div class="bg" id="bgstatus"></div>
    <div id="facts"></div>
    <div class="acts">
      <button class="primary" id="consolidate" type="button">Consolidate what I've noticed</button>
      <button id="prove" type="button">Prove recall</button>
    </div>
    <div class="note" id="memnote">“Noticed” = flagged as worth learning. “Learned” = a consolidation absorbed it and verified it can be recalled cold.</div>
  </div>
  <div id="act">
    <div class="ahd">
      <h3>Activity</h3>
      <span class="live" id="actlive" style="display:none"><span class="d"></span>live</span>
      <span class="filt" id="actfilt">
        <span data-f="all" class="on">all</span>
        <span data-f="note">noticed</span>
        <span data-f="train">training</span>
        <span data-f="learn">learned</span>
      </span>
    </div>
    <div class="feed" id="actfeed"></div>
  </div>
  <div id="log">
    <div class="empty" id="empty">
      <h2>Talk to engram</h2>
      <div>It keeps the conversation — and quietly learns you as you go.</div>
    </div>
  </div>
  <form id="form">
    <textarea id="input" rows="1" placeholder="Message engram…" autofocus></textarea>
    <button id="send" type="submit">Send</button>
  </form>
</div>
<script src="{{ static:chat.js }}"></script>
</body>
</html>
