<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>engram</title>
<style>
  :root {
    --bg: #f7f7f8; --panel: #ffffff; --ink: #1a1a1f; --muted: #8a8a94;
    --user: #2f6df6; --user-ink: #ffffff; --bot: #ececed; --line: #e3e3e7; --accent: #2f6df6;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#141417; --panel:#1c1c21; --ink:#ececf1; --muted:#8f8f9a;
            --user:#3b7bff; --user-ink:#fff; --bot:#26262c; --line:#2c2c33; --accent:#5b8bff; }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--ink); font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #app { max-width: 780px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--line); }
  header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: .2px; }
  header .pill { margin-left: auto; font-size: 12px; color: var(--muted); background: var(--panel);
                 border: 1px solid var(--line); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
  #log { flex: 1; overflow-y: auto; padding: 22px 18px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .bubble { max-width: 82%; padding: 11px 15px; border-radius: 16px; white-space: pre-wrap; word-wrap: break-word; }
  .user .bubble { background: var(--user); color: var(--user-ink); border-bottom-right-radius: 5px; }
  .bot .bubble { background: var(--bot); color: var(--ink); border-bottom-left-radius: 5px; }
  .bot .bubble.thinking { color: var(--muted); }
  .empty { margin: auto; text-align: center; color: var(--muted); }
  .empty h2 { font-weight: 600; color: var(--ink); margin: 0 0 6px; }
  form { display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--line); background: var(--bg); }
  textarea { flex: 1; resize: none; max-height: 160px; padding: 11px 14px; border-radius: 14px;
             border: 1px solid var(--line); background: var(--panel); color: var(--ink); font: inherit; outline: none; }
  textarea:focus { border-color: var(--accent); }
  button { border: 0; background: var(--accent); color: #fff; font: inherit; font-weight: 600;
           padding: 0 20px; border-radius: 14px; cursor: pointer; }
  button:disabled { opacity: .45; cursor: default; }
  .blink::after { content: "▋"; animation: b 1s steps(2) infinite; color: var(--muted); }
  @keyframes b { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="dot"></span>
    <h1>engram</h1>
    <span class="pill" id="pill">learning…</span>
  </header>
  <div id="log">
    <div class="empty" id="empty">
      <h2>Talk to engram</h2>
      <div>It keeps the conversation — and quietly learns you as you go.</div>
    </div>
  </div>
  <form id="form">
    <textarea id="input" rows="1" placeholder="Message engram…" autofocus></textarea>
    <button id="send" type="submit">Send</button>
  </form>
</div>
<script>
  const log = document.getElementById("log"), form = document.getElementById("form");
  const input = document.getElementById("input"), sendBtn = document.getElementById("send");
  const pill = document.getElementById("pill"), empty = document.getElementById("empty");
  const messages = [];

  function bubble(role, text, cls) {
    const row = document.createElement("div"); row.className = "row " + role;
    const b = document.createElement("div"); b.className = "bubble " + (cls || ""); b.textContent = text;
    row.appendChild(b); log.appendChild(row); log.scrollTop = log.scrollHeight; return b;
  }
  function autosize() { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 160) + "px"; }
  input.addEventListener("input", autosize);
  input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); } });

  async function refreshPill() {
    try {
      const b = await (await fetch("/v1/brain")).json();
      const n = b.individuation && b.individuation.experiences || 0;
      pill.textContent = b.individuation && b.individuation.enabled ? ("🧠 learning · " + n + " noted") : "chat";
    } catch (e) { pill.textContent = "offline"; }
  }

  form.addEventListener("submit", async e => {
    e.preventDefault();
    const text = input.value.trim(); if (!text) return;
    if (empty) empty.remove();
    input.value = ""; autosize(); input.disabled = sendBtn.disabled = true;
    bubble("user", text); messages.push({ role: "user", content: text });
    const out = bubble("bot", "", "thinking blink");
    const reply = { role: "assistant", content: "" };
    try {
      const res = await fetch("/v1/chat/completions", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages, stream: true, enable_thinking: false, max_tokens: 1024 })
      });
      const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = "";
      while (true) {
        const { done, value } = await reader.read(); if (done) break;
        buf += dec.decode(value, { stream: true });
        const parts = buf.split("\n\n"); buf = parts.pop();
        for (const p of parts) {
          const line = p.trim(); if (!line.startsWith("data:")) continue;
          const data = line.slice(5).trim(); if (data === "[DONE]") continue;
          const delta = JSON.parse(data).choices?.[0]?.delta || {};
          if (delta.content) { reply.content += delta.content; out.className = "bubble blink"; out.textContent = reply.content; log.scrollTop = log.scrollHeight; }
        }
      }
      out.className = "bubble"; out.textContent = reply.content || "…";
      messages.push(reply);
    } catch (err) {
      out.className = "bubble"; out.textContent = "⚠︎ could not reach engram: " + err.message;
    } finally {
      input.disabled = sendBtn.disabled = false; input.focus(); refreshPill();
    }
  });
  refreshPill();
</script>
</body>
</html>
